<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  #map { width: 100%; height: 100vh; background: #f2f2f2; }

  .titol {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 1000; background: rgba(255,255,255,0.92); padding: 8px 16px;
    border-radius: 6px; box-shadow: 0 1px 5px rgba(0,0,0,0.25);
    font-size: 16px; font-weight: 600; color: #222; text-align: center;
    max-width: 90vw;
  }
  .titol small { display: block; font-weight: 400; font-size: 12px; color: #666; margin-top: 2px; }

  .legend {
    background: rgba(255,255,255,0.94); padding: 10px 12px; border-radius: 6px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.25); line-height: 1.5; font-size: 13px;
    color: #333; max-height: 70vh; overflow-y: auto;
  }
  .legend h4 { margin: 0 0 4px; font-size: 13px; }
  .legend .hint { margin: 0 0 7px; font-size: 11px; color: #999; }
  .legend .row {
    display: flex; align-items: center; margin: 1px 0; padding: 2px 4px;
    border-radius: 4px; cursor: pointer; user-select: none;
  }
  .legend .row:hover { background: #f0f0f0; }
  .legend .row.off { opacity: 0.45; text-decoration: line-through; }
  .legend .row.off .dot { background: #bbb !important; }
  .legend .dot {
    width: 13px; height: 13px; border-radius: 50%; margin-right: 7px;
    border: 1px solid rgba(0,0,0,0.35); flex: 0 0 auto;
  }
  .legend .cnt { color: #888; margin-left: 4px; font-size: 11px; }
  .legend .sep { border-top: 1px solid #ddd; margin: 7px 0 6px; }
  .legend .qd { width: 13px; height: 13px; margin-right: 7px; flex: 0 0 auto;
    background: rgba(212,160,23,0.18); border: 2px solid #b8860b; }

  .leaflet-popup-content, .leaflet-tooltip { font-size: 13px; line-height: 1.45; }
  .eq-tip b { font-size: 13.5px; }
  .eq-tip .cat { display: inline-block; margin-top: 3px; padding: 1px 6px;
    border-radius: 4px; color: #fff; font-size: 11px; }
  .eq-tip .loc { color: #555; }

  .qd-label { background: transparent; border: none; box-shadow: none;
    color: #8a6400; font-weight: 700; font-size: 13px; text-shadow: 0 0 3px #fff, 0 0 3px #fff; }
</style>

  const legend = L.control({ position: 'bottomright' });
  legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'legend');
    let h = '<h4>Categoria d\'equipament</h4>' +
            '<p class="hint">Clica una categoria per amagar-la</p>';
    LEGEND.forEach(function(it) {
      h += '<div class="row" data-cat="' + esc(it.c) + '">' +
           '<span class="dot" style="background:' + it.color + '"></span>' +
           esc(it.c) + '<span class="cnt">(' + it.n + ')</span></div>';
    });
    h += '<div class="sep"></div>';
    h += '<div class="row" style="cursor:default">' +
         '<span class="qd"></span>Quadrat d\'Or</div>';
    div.innerHTML = h;

    div.querySelectorAll('.row[data-cat]').forEach(function(row) {
      row.addEventListener('click', function() {
        const cat = row.getAttribute('data-cat');
        const g = groups[cat];
        if (!g) return;
        if (map.hasLayer(g)) { map.removeLayer(g); row.classList.add('off'); }
        else { g.addTo(map); row.classList.remove('off'); }
      });
    });

    L.DomEvent.disableClickPropagation(div);
    L.DomEvent.disableScrollPropagation(div);
    return div;
  };
  legend.addTo(map);

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
